# Host nginx in front of docker web (127.0.0.1:19220).
# Hetzner Cloud LB targets this port 9220; LB health check should use GET /lb-health (always 200).
# When the docker web container is restarting, users see deploy-maintenance.html instead of Hetzner 503.
server {
    listen 9220 default_server;
    listen [::]:9220 default_server;
    server_name _;

    client_max_body_size 20m;

    error_page 502 503 504 =503 /deploy-maintenance.html;

    location = /lb-health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /deploy-maintenance.html {
        root /var/www/open-ems-maintenance;
        internal;
    }

    location / {
        proxy_pass http://127.0.0.1:19220;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
    }
}
