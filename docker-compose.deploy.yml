# Production stack: pull API image from GHCR (or any registry); Postgres + Flyway on the host.
# Copy .env.deploy.example to .env on the server and set secrets before first up.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openems}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-openems}
    volumes:
      - open_ems_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openems} -d ${POSTGRES_DB:-openems}"]
      interval: 3s
      timeout: 5s
      retries: 15

  migrate:
    image: flyway/flyway:9.22.3
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-openems}
      FLYWAY_USER: ${POSTGRES_USER:-openems}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_CONNECT_RETRIES: "60"
    volumes:
      - ./db/migration/postgres/common:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

  api:
    image: ${OPEN_EMS_IMAGE:?Set OPEN_EMS_IMAGE to your registry image:tag (e.g. ghcr.io/owner/open-ems:sha)}
    restart: unless-stopped
    ports:
      - "${OPEN_EMS_HOST_PORT:-8090}:8090"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openems}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openems}
      B2B_API_BASE_URL: ${B2B_API_BASE_URL:-https://220-km.com:8080}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  open_ems_pgdata:
