<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open EMS — Power flow</title>
    <link rel="stylesheet" href="/static/power-flow/power-flow.css" />
  </head>
  <body class="pf-body">
    <div class="pf-root">
      <header class="pf-header">
        <label class="pf-station-field">
          <span id="pf-station-label">EV Port # (optional):</span>
          <input
            id="pf-station"
            class="pf-station-input"
            type="text"
            inputmode="numeric"
            placeholder="all ports"
            autocomplete="off"
          />
        </label>
        <label class="pf-station-field pf-inverter-field">
          <span id="pf-inverter-label">Inverter ID (optional):</span>
          <select id="pf-inverter" class="pf-inverter-select"></select>
        </label>
        <select id="pf-lang" class="pf-lang-select"></select>
      </header>
      <div class="pf-graph-wrap">
        <div id="pf-graph" class="pf-graph" aria-label="Power flow diagram">
          <!-- In-flow 1:1 box: all overlays are position:absolute, so this reserves height in every browser -->
          <div class="pf-graph-sizer" aria-hidden="true"></div>
          <svg
            id="pf-svg"
            class="pf-flow-svg"
            viewBox="0 0 400 400"
            preserveAspectRatio="xMidYMid meet"
          >
            <defs>
              <radialGradient id="pf-flow-dot-grad" cx="40%" cy="40%" r="65%" gradientUnits="objectBoundingBox">
                <stop offset="0%" stop-color="#fdf4ff" />
                <stop offset="60%" stop-color="#e879f9" />
                <stop offset="100%" stop-color="#a855f7" />
              </radialGradient>
            </defs>
            <g id="pf-lines"></g>
            <g id="pf-dots"></g>
          </svg>
          <div id="pf-nodes"></div>
        </div>
        <div id="pf-error" class="pf-error" hidden></div>
      </div>
      <aside class="pf-ukraine-qr" aria-label="Defend Ukraine — United24">
        <a
          class="pf-ukraine-qr-link"
          href="https://u24.gov.ua/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            class="pf-ukraine-qr-img"
            src="/static/power-flow/protect-ukraine-qr.png"
            width="120"
            height="120"
            alt="QR code — United24, Defend Ukraine"
            decoding="async"
          />
          <span class="pf-ukraine-qr-caption">Defend Ukraine</span>
        </a>
      </aside>
    </div>
    <script type="module" src="/static/power-flow/power-flow.js"></script>
  </body>
</html>
