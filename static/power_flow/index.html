<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open EMS — Power flow</title>
    <link rel="stylesheet" href="/static/power-flow/power-flow.css" />
  </head>
  <body class="pf-body">
    <div class="pf-root">
      <header class="pf-header">
        <label>
          Станція (опційно):
          <input
            id="pf-station"
            class="pf-station-input"
            type="text"
            inputmode="numeric"
            placeholder="усі мережі"
            autocomplete="off"
          />
        </label>
        <a href="https://220-km.com/b2b?graphView=1" target="_blank" rel="noopener noreferrer"
          >220-km.com B2B (оригінал)</a
        >
      </header>
      <div class="pf-graph-wrap">
        <div id="pf-graph" class="pf-graph" aria-label="Схема потоків потужності">
          <svg
            id="pf-svg"
            class="pf-flow-svg"
            viewBox="0 0 400 400"
            preserveAspectRatio="xMidYMid meet"
          >
            <defs>
              <radialGradient id="pf-flow-dot-grad" cx="40%" cy="40%" r="65%" gradientUnits="objectBoundingBox">
                <stop offset="0%" stop-color="#fdf4ff" />
                <stop offset="60%" stop-color="#e879f9" />
                <stop offset="100%" stop-color="#a855f7" />
              </radialGradient>
            </defs>
            <g id="pf-lines"></g>
            <g id="pf-dots"></g>
          </svg>
          <div id="pf-nodes"></div>
        </div>
        <div id="pf-error" class="pf-error" hidden></div>
      </div>
    </div>
    <script type="module" src="/static/power-flow/power-flow.js"></script>
  </body>
</html>
