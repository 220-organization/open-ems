# Render Blueprint: https://render.com/docs/infrastructure-as-code
# After pushing to GitHub: Dashboard → New → Blueprint → select repo → apply this file.

databases:
  - name: open-ems-db
    databaseName: openems
    user: openems

services:
  - type: web
    name: open-ems
    runtime: docker
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: RUN_FLYWAY_ON_START
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: open-ems-db
          property: connectionString
      - key: B2B_API_BASE_URL
        value: https://220-km.com:8080
