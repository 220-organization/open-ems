# PostgreSQL + Flyway + FastAPI (9221) + production React/nginx (9220).
# UI build proxies /api → api:8090; set REACT_APP_API_BASE_URL at image build only if you skip the proxy.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openems
      POSTGRES_PASSWORD: openems
      POSTGRES_DB: openems
    volumes:
      - open_ems_pgdata:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openems -d openems']
      interval: 3s
      timeout: 5s
      retries: 15

  migrate:
    image: flyway/flyway:9.22.3
    command: -url=jdbc:postgresql://db:5432/openems -user=openems -password=openems -connectRetries=60 migrate
    volumes:
      - ./db/migration/postgres/common:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    ports:
      - '9221:8090'
    environment:
      OPEN_EMS_SERVE_SPA: '0'
      DATABASE_URL: postgresql+asyncpg://openems:openems@db:5432/openems
      B2B_API_BASE_URL: ${B2B_API_BASE_URL:-https://220-km.com:8080}
      DEYE_API_BASE_URL: ${DEYE_API_BASE_URL:-https://eu1-developer.deyecloud.com/v1.0}
      DEYE_APP_ID: ${DEYE_APP_ID:-}
      DEYE_APP_SECRET: ${DEYE_APP_SECRET:-}
      DEYE_EMAIL: ${DEYE_EMAIL:-}
      DEYE_PASSWORD: ${DEYE_PASSWORD:-}
      DEYE_COMPANY_ID: ${DEYE_COMPANY_ID:-0}
      DEYE_SOC_SNAPSHOT_ENABLED: ${DEYE_SOC_SNAPSHOT_ENABLED:-true}
      DEYE_SOC_SNAPSHOT_INTERVAL_SEC: ${DEYE_SOC_SNAPSHOT_INTERVAL_SEC:-300}
      DEYE_PEAK_AUTO_DISCHARGE_SCHEDULER_ENABLED: ${DEYE_PEAK_AUTO_DISCHARGE_SCHEDULER_ENABLED:-true}
      DEYE_PEAK_AUTO_DISCHARGE_INTERVAL_SEC: ${DEYE_PEAK_AUTO_DISCHARGE_INTERVAL_SEC:-600}
      OREE_API_BASE_URL: ${OREE_API_BASE_URL:-https://api.oree.com.ua/index.php/api}
      OREE_API_DAM_PRICES_PATH: ${OREE_API_DAM_PRICES_PATH:-/damprices}
      OREE_API_KEY: ${OREE_API_KEY:-}
      OREE_COMPARE_ZONE_EIC: ${OREE_COMPARE_ZONE_EIC:-10Y1001C--000182}
      # ENTSO-E DAM (ES/PL/UA) — must be passed via host .env (deploy workflow); no .env file inside the image
      ENTSOE_API_BASE_URL: ${ENTSOE_API_BASE_URL:-https://web-api.tp.entsoe.eu/api}
      ENTSOE_SECURITY_TOKEN: ${ENTSOE_SECURITY_TOKEN:-}
      # Optional: extra ENTSO-E EICs only; ES/PL/UA are always synced (see app/settings.py)
      ENTSOE_DAM_ZONE_EICS: '${ENTSOE_DAM_ZONE_EICS:-}'
      # Huawei FusionSolar Northbound (Basic APIs) — see .env.example
      HUAWEI_BASE_URL: ${HUAWEI_BASE_URL:-https://eu5.fusionsolar.huawei.com}
      HUAWEI_USER_NAME: ${HUAWEI_USER_NAME:-}
      HUAWEI_SYSTEM_CODE: ${HUAWEI_SYSTEM_CODE:-}
      HUAWEI_METER_DEV_ID: ${HUAWEI_METER_DEV_ID:-}
      HUAWEI_METER_DEV_TYPE_ID: ${HUAWEI_METER_DEV_TYPE_ID:-47}
      HUAWEI_INVERTER_DEV_ID: ${HUAWEI_INVERTER_DEV_ID:-}
      HUAWEI_INVERTER_DEV_TYPE_ID: ${HUAWEI_INVERTER_DEV_TYPE_ID:-1}
      HUAWEI_DISK_CACHE_ENABLED: ${HUAWEI_DISK_CACHE_ENABLED:-true}
      HUAWEI_STATION_LIST_DISK_TTL_SEC: ${HUAWEI_STATION_LIST_DISK_TTL_SEC:-604800}
      HUAWEI_STATION_LIST_COOLDOWN_AFTER_407_SEC: ${HUAWEI_STATION_LIST_COOLDOWN_AFTER_407_SEC:-300}
      HUAWEI_CACHE_DIR: ${HUAWEI_CACHE_DIR:-}
      HUAWEI_POWER_SNAPSHOT_ENABLED: ${HUAWEI_POWER_SNAPSHOT_ENABLED:-true}
      HUAWEI_POWER_SNAPSHOT_INTERVAL_SEC: ${HUAWEI_POWER_SNAPSHOT_INTERVAL_SEC:-300}
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-}
        REACT_APP_CLARITY_PROJECT_ID: ${REACT_APP_CLARITY_PROJECT_ID:-}
        REACT_APP_GA_MEASUREMENT_ID: ${REACT_APP_GA_MEASUREMENT_ID:-}
    restart: unless-stopped
    ports:
      - '9220:80'
    depends_on:
      - api

volumes:
  open_ems_pgdata:
