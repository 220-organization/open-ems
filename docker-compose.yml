# PostgreSQL + Flyway + FastAPI (9221) + production React/nginx (9220).
# UI build proxies /api → api:8090; set REACT_APP_API_BASE_URL at image build only if you skip the proxy.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openems
      POSTGRES_PASSWORD: openems
      POSTGRES_DB: openems
    volumes:
      - open_ems_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openems -d openems"]
      interval: 3s
      timeout: 5s
      retries: 15

  migrate:
    image: flyway/flyway:9.22.3
    command: -url=jdbc:postgresql://db:5432/openems -user=openems -password=openems -connectRetries=60 migrate
    volumes:
      - ./db/migration/postgres/common:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    ports:
      - "9221:8090"
    environment:
      OPEN_EMS_SERVE_SPA: "0"
      DATABASE_URL: postgresql+asyncpg://openems:openems@db:5432/openems
      B2B_API_BASE_URL: ${B2B_API_BASE_URL:-https://220-km.com:8080}
      DEYE_API_BASE_URL: ${DEYE_API_BASE_URL:-https://eu1-developer.deyecloud.com/v1.0}
      DEYE_APP_ID: ${DEYE_APP_ID:-}
      DEYE_APP_SECRET: ${DEYE_APP_SECRET:-}
      DEYE_EMAIL: ${DEYE_EMAIL:-}
      DEYE_PASSWORD: ${DEYE_PASSWORD:-}
      DEYE_COMPANY_ID: ${DEYE_COMPANY_ID:-0}
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "9220:80"
    depends_on:
      - api

volumes:
  open_ems_pgdata:
