name: Deploy Open EMS

on:
  push:
    branches: [main, master, preprod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pack sources
        run: |
          tar --exclude='./.git' --exclude='./.venv' -czf /tmp/open-ems.tgz .
      - name: ensure Docker on server
        uses: fifsky/ssh-action@master
        with:
          command: |
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker CLI not found; installing docker.io ..."
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
              systemctl enable --now docker 2>/dev/null || true
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose (v2) not found; installing docker-compose-v2 ..."
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-v2 || true
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose v2 is required. Install docker-compose-v2 or Docker Compose plugin on the server." >&2
              exit 1
            fi
            docker --version
            docker compose version
          host: 65.108.212.26
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      - name: clean remote tree
        uses: fifsky/ssh-action@master
        with:
          command: |
            rm -rf /220/open-ems
          host: 65.108.212.26
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      # Single-file copy: target must be the remote file path, not only a directory (see appleboy/scp-action).
      - name: copy archive to server
        uses: appleboy/scp-action@master
        with:
          host: 65.108.212.26
          username: root
          port: 22
          key: ${{ secrets.PRIVATE_KEY }}
          source: /tmp/open-ems.tgz
          target: /tmp/open-ems.tgz
          timeout: 60s
          command_timeout: 30m
          proxy_timeout: 30m
      - name: extract and docker compose up
        uses: fifsky/ssh-action@master
        with:
          command: |
            test -f /tmp/open-ems.tgz || { echo "ERROR: /tmp/open-ems.tgz missing after scp" >&2; ls -la /tmp; exit 1; }
            mkdir -p /220/open-ems
            tar -xzf /tmp/open-ems.tgz -C /220/open-ems
            rm -f /tmp/open-ems.tgz
            cd /220/open-ems &&
            docker compose down --remove-orphans &&
            docker compose up -d --build
          host: 65.108.212.26
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
