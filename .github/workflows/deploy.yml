name: Deploy Open EMS

on:
  push:
    branches: [main, master, preprod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pack sources
        run: |
          tar --exclude='./.git' --exclude='./.venv' -czf /tmp/open-ems.tgz .
      - name: clean remote tree
        uses: fifsky/ssh-action@master
        with:
          command: |
            rm -rf /220/open-ems
          host: 65.108.212.26
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      - name: copy archive to server
        uses: appleboy/scp-action@master
        with:
          host: 65.108.212.26
          username: root
          port: 22
          key: ${{ secrets.PRIVATE_KEY }}
          source: /tmp/open-ems.tgz
          target: /tmp/
          timeout: 60s
          command_timeout: 30m
          proxy_timeout: 30m
      - name: extract and docker compose up
        uses: fifsky/ssh-action@master
        with:
          command: |
            mkdir -p /220/open-ems
            tar -xzf /tmp/open-ems.tgz -C /220/open-ems
            rm -f /tmp/open-ems.tgz
            cd /220/open-ems &&
            docker compose down --remove-orphans &&
            docker compose up -d --build
          host: 65.108.212.26
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
