name: Deploy Open EMS

on:
  push:
    branches: [main, master, preprod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Node 20 runners are deprecated; use Node 24 for JS-based actions (see GitHub changelog 2025-09-19).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      # Same check as Dockerfile.ui (npm ci). Fails early if package.json and package-lock.json drift.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Validate UI lockfile (npm ci — must match Docker web build)
        run: |
          set -euo pipefail
          cd ui
          rm -rf node_modules
          npm ci
      - name: pack sources
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./.venv' \
            --exclude='./ui/node_modules' \
            --exclude='./ui/build' \
            -czf /tmp/open-ems.tgz .
      - name: ensure Docker on server
        uses: fifsky/ssh-action@master
        with:
          command: |
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker CLI not found; installing docker.io ..."
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
              systemctl enable --now docker 2>/dev/null || true
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose (v2) not found; installing docker-compose-v2 ..."
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-v2 || true
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose v2 is required. Install docker-compose-v2 or Docker Compose plugin on the server." >&2
              exit 1
            fi
            docker --version
            docker compose version
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      - name: clean remote tree
        uses: fifsky/ssh-action@master
        with:
          command: |
            rm -rf /220/open-ems /tmp/open-ems.tgz
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      # appleboy/scp-action may create a directory named like the target and place the file inside it.
      - name: copy archive to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          port: 22
          key: ${{ secrets.PRIVATE_KEY }}
          source: /tmp/open-ems.tgz
          target: /tmp/open-ems.tgz
          timeout: 60s
          command_timeout: 30m
          proxy_timeout: 30m
      - name: extract archive on server
        uses: fifsky/ssh-action@master
        with:
          command: |
            set -e
            ARCHIVE=""
            if [ -f /tmp/open-ems.tgz ]; then
              ARCHIVE=/tmp/open-ems.tgz
            elif [ -f /tmp/open-ems.tgz/open-ems.tgz ]; then
              ARCHIVE=/tmp/open-ems.tgz/open-ems.tgz
            elif [ -d /tmp/open-ems.tgz ]; then
              ARCHIVE=$(find /tmp/open-ems.tgz -type f \( -name 'open-ems.tgz' -o -name '*.tgz' \) 2>/dev/null | head -1 || true)
            fi
            if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
              echo "ERROR: deploy archive not found after scp (expected file or /tmp/open-ems.tgz/open-ems.tgz)" >&2
              ls -la /tmp
              find /tmp/open-ems.tgz -type f 2>/dev/null || true
              exit 1
            fi
            echo "Using archive: $ARCHIVE"
            mkdir -p /220/open-ems
            tar -xzf "$ARCHIVE" -C /220/open-ems
            rm -rf /tmp/open-ems.tgz
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      - name: Write Compose .env on runner (GitHub secrets → server file)
        env:
          B2B_API_BASE_URL: ${{ secrets.B2B_API_BASE_URL }}
          DEYE_API_BASE_URL: ${{ secrets.DEYE_API_BASE_URL }}
          DEYE_APP_ID: ${{ secrets.DEYE_APP_ID }}
          DEYE_APP_SECRET: ${{ secrets.DEYE_APP_SECRET }}
          DEYE_EMAIL: ${{ secrets.DEYE_EMAIL }}
          DEYE_PASSWORD: ${{ secrets.DEYE_PASSWORD }}
          DEYE_COMPANY_ID: ${{ secrets.DEYE_COMPANY_ID }}
          OREE_API_BASE_URL: ${{ secrets.OREE_API_BASE_URL }}
          OREE_API_DAM_PRICES_PATH: ${{ secrets.OREE_API_DAM_PRICES_PATH }}
          OREE_API_KEY: ${{ secrets.OREE_API_KEY }}
          OREE_COMPARE_ZONE_EIC: ${{ secrets.OREE_COMPARE_ZONE_EIC }}
          ENTSOE_API_BASE_URL: ${{ secrets.ENTSOE_API_BASE_URL }}
          ENTSOE_SECURITY_TOKEN: ${{ secrets.ENTSOE_SECURITY_TOKEN }}
          ENTSOE_DAM_ZONE_EICS: ${{ secrets.ENTSOE_DAM_ZONE_EICS }}
          HUAWEI_BASE_URL: ${{ secrets.HUAWEI_BASE_URL }}
          HUAWEI_USER_NAME: ${{ secrets.HUAWEI_USER_NAME }}
          HUAWEI_SYSTEM_CODE: ${{ secrets.HUAWEI_SYSTEM_CODE }}
          HUAWEI_METER_DEV_ID: ${{ secrets.HUAWEI_METER_DEV_ID }}
          HUAWEI_METER_DEV_TYPE_ID: ${{ secrets.HUAWEI_METER_DEV_TYPE_ID }}
          HUAWEI_INVERTER_DEV_ID: ${{ secrets.HUAWEI_INVERTER_DEV_ID }}
          HUAWEI_INVERTER_DEV_TYPE_ID: ${{ secrets.HUAWEI_INVERTER_DEV_TYPE_ID }}
          HUAWEI_STATION_LIST_DISK_TTL_SEC: ${{ secrets.HUAWEI_STATION_LIST_DISK_TTL_SEC }}
          HUAWEI_STATION_LIST_COOLDOWN_AFTER_407_SEC: ${{ secrets.HUAWEI_STATION_LIST_COOLDOWN_AFTER_407_SEC }}
          HUAWEI_POWER_SNAPSHOT_ENABLED: ${{ secrets.HUAWEI_POWER_SNAPSHOT_ENABLED }}
          HUAWEI_POWER_SNAPSHOT_INTERVAL_SEC: ${{ secrets.HUAWEI_POWER_SNAPSHOT_INTERVAL_SEC }}
        run: |
          set -e
          umask 077
          {
            printf '%s\n' "DATABASE_URL=postgresql+asyncpg://openems:openems@db:5432/openems"
            printf '%s\n' "B2B_API_BASE_URL=${B2B_API_BASE_URL:-https://220-km.com:8080}"
            printf '%s\n' "DEYE_API_BASE_URL=${DEYE_API_BASE_URL:-https://eu1-developer.deyecloud.com/v1.0}"
            printf '%s\n' "DEYE_APP_ID=${DEYE_APP_ID}"
            printf '%s\n' "DEYE_APP_SECRET=${DEYE_APP_SECRET}"
            printf '%s\n' "DEYE_EMAIL=${DEYE_EMAIL}"
            printf '%s\n' "DEYE_PASSWORD=${DEYE_PASSWORD}"
            printf '%s\n' "DEYE_COMPANY_ID=${DEYE_COMPANY_ID:-0}"
            printf '%s\n' "OREE_API_BASE_URL=${OREE_API_BASE_URL:-https://api.oree.com.ua/index.php/api}"
            printf '%s\n' "OREE_API_DAM_PRICES_PATH=${OREE_API_DAM_PRICES_PATH:-/damprices}"
            printf '%s\n' "OREE_API_KEY=${OREE_API_KEY:-}"
            printf '%s\n' "OREE_COMPARE_ZONE_EIC=${OREE_COMPARE_ZONE_EIC:-10Y1001C--000182}"
            printf '%s\n' "ENTSOE_API_BASE_URL=${ENTSOE_API_BASE_URL:-https://web-api.tp.entsoe.eu/api}"
            printf '%s\n' "ENTSOE_SECURITY_TOKEN=${ENTSOE_SECURITY_TOKEN:-}"
            printf '%s\n' "ENTSOE_DAM_ZONE_EICS=${ENTSOE_DAM_ZONE_EICS:-}"
            printf '%s\n' "HUAWEI_BASE_URL=${HUAWEI_BASE_URL:-https://eu5.fusionsolar.huawei.com}"
            printf '%s\n' "HUAWEI_USER_NAME=${HUAWEI_USER_NAME:-}"
            printf '%s\n' "HUAWEI_SYSTEM_CODE=${HUAWEI_SYSTEM_CODE:-}"
            printf '%s\n' "HUAWEI_METER_DEV_ID=${HUAWEI_METER_DEV_ID:-}"
            printf '%s\n' "HUAWEI_METER_DEV_TYPE_ID=${HUAWEI_METER_DEV_TYPE_ID:-47}"
            printf '%s\n' "HUAWEI_INVERTER_DEV_ID=${HUAWEI_INVERTER_DEV_ID:-}"
            printf '%s\n' "HUAWEI_INVERTER_DEV_TYPE_ID=${HUAWEI_INVERTER_DEV_TYPE_ID:-1}"
            printf '%s\n' "HUAWEI_STATION_LIST_DISK_TTL_SEC=${HUAWEI_STATION_LIST_DISK_TTL_SEC:-604800}"
            printf '%s\n' "HUAWEI_STATION_LIST_COOLDOWN_AFTER_407_SEC=${HUAWEI_STATION_LIST_COOLDOWN_AFTER_407_SEC:-300}"
            printf '%s\n' "HUAWEI_POWER_SNAPSHOT_ENABLED=${HUAWEI_POWER_SNAPSHOT_ENABLED:-true}"
            printf '%s\n' "HUAWEI_POWER_SNAPSHOT_INTERVAL_SEC=${HUAWEI_POWER_SNAPSHOT_INTERVAL_SEC:-300}"
          } > /tmp/open-ems-deploy.env
          test -s /tmp/open-ems-deploy.env
      # appleboy/scp-action often creates a *directory* named like the target and nests the file
      # (e.g. /tmp/open-ems-deploy.env/tmp/open-ems-deploy.env). Target /tmp + find covers all cases.
      - name: copy .env to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          port: 22
          key: ${{ secrets.PRIVATE_KEY }}
          source: /tmp/open-ems-deploy.env
          target: /tmp
          timeout: 60s
          command_timeout: 5m
      - name: docker compose up on server
        uses: fifsky/ssh-action@master
        with:
          command: |
            set -e
            # appleboy/scp-action often nests uploads (e.g. /tmp/tmp/open-ems-deploy.env when target is /tmp).
            ENV_SRC=$(find /tmp -maxdepth 12 -type f -name 'open-ems-deploy.env' 2>/dev/null | head -1 || true)
            if [ -z "$ENV_SRC" ] || [ ! -f "$ENV_SRC" ]; then
              echo "ERROR: open-ems-deploy.env not found after scp" >&2
              ls -la /tmp || true
              find /tmp -maxdepth 12 -type f -name 'open-ems-deploy.env' 2>/dev/null || true
              exit 1
            fi
            echo "Using deploy env file: $ENV_SRC"
            mv -f "$ENV_SRC" /220/open-ems/.env
            rm -rf /tmp/open-ems-deploy.env 2>/dev/null || true
            cd /220/open-ems
            chmod 600 .env
            docker compose down --remove-orphans
            docker compose up -d --build
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
