name: Deploy Open EMS

on:
  push:
    branches: [main, master, preprod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Node 20 runners are deprecated; use Node 24 for JS-based actions (see GitHub changelog 2025-09-19).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - name: pack sources
        run: |
          tar --exclude='./.git' --exclude='./.venv' -czf /tmp/open-ems.tgz .
      - name: ensure Docker on server
        uses: fifsky/ssh-action@master
        with:
          command: |
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker CLI not found; installing docker.io ..."
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io
              systemctl enable --now docker 2>/dev/null || true
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "docker compose (v2) not found; installing docker-compose-v2 ..."
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-v2 || true
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose v2 is required. Install docker-compose-v2 or Docker Compose plugin on the server." >&2
              exit 1
            fi
            docker --version
            docker compose version
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      - name: clean remote tree
        uses: fifsky/ssh-action@master
        with:
          command: |
            rm -rf /220/open-ems /tmp/open-ems.tgz
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      # appleboy/scp-action may create a directory named like the target and place the file inside it.
      - name: copy archive to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          port: 22
          key: ${{ secrets.PRIVATE_KEY }}
          source: /tmp/open-ems.tgz
          target: /tmp/open-ems.tgz
          timeout: 60s
          command_timeout: 30m
          proxy_timeout: 30m
      - name: extract archive on server
        uses: fifsky/ssh-action@master
        with:
          command: |
            set -e
            ARCHIVE=""
            if [ -f /tmp/open-ems.tgz ]; then
              ARCHIVE=/tmp/open-ems.tgz
            elif [ -f /tmp/open-ems.tgz/open-ems.tgz ]; then
              ARCHIVE=/tmp/open-ems.tgz/open-ems.tgz
            elif [ -d /tmp/open-ems.tgz ]; then
              ARCHIVE=$(find /tmp/open-ems.tgz -type f \( -name 'open-ems.tgz' -o -name '*.tgz' \) 2>/dev/null | head -1 || true)
            fi
            if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
              echo "ERROR: deploy archive not found after scp (expected file or /tmp/open-ems.tgz/open-ems.tgz)" >&2
              ls -la /tmp
              find /tmp/open-ems.tgz -type f 2>/dev/null || true
              exit 1
            fi
            echo "Using archive: $ARCHIVE"
            mkdir -p /220/open-ems
            tar -xzf "$ARCHIVE" -C /220/open-ems
            rm -rf /tmp/open-ems.tgz
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
      - name: Write Compose .env on runner (GitHub secrets → server file)
        env:
          B2B_API_BASE_URL: ${{ secrets.B2B_API_BASE_URL }}
          DEYE_API_BASE_URL: ${{ secrets.DEYE_API_BASE_URL }}
          DEYE_APP_ID: ${{ secrets.DEYE_APP_ID }}
          DEYE_APP_SECRET: ${{ secrets.DEYE_APP_SECRET }}
          DEYE_EMAIL: ${{ secrets.DEYE_EMAIL }}
          DEYE_PASSWORD: ${{ secrets.DEYE_PASSWORD }}
          DEYE_COMPANY_ID: ${{ secrets.DEYE_COMPANY_ID }}
        run: |
          set -e
          umask 077
          {
            printf '%s\n' "DATABASE_URL=postgresql+asyncpg://openems:openems@db:5432/openems"
            printf '%s\n' "B2B_API_BASE_URL=${B2B_API_BASE_URL:-https://220-km.com:8080}"
            printf '%s\n' "DEYE_API_BASE_URL=${DEYE_API_BASE_URL:-https://eu1-developer.deyecloud.com/v1.0}"
            printf '%s\n' "DEYE_APP_ID=${DEYE_APP_ID}"
            printf '%s\n' "DEYE_APP_SECRET=${DEYE_APP_SECRET}"
            printf '%s\n' "DEYE_EMAIL=${DEYE_EMAIL}"
            printf '%s\n' "DEYE_PASSWORD=${DEYE_PASSWORD}"
            printf '%s\n' "DEYE_COMPANY_ID=${DEYE_COMPANY_ID:-0}"
          } > /tmp/open-ems-deploy.env
          test -s /tmp/open-ems-deploy.env
      # appleboy/scp-action often creates a *directory* named like the target and nests the file
      # (e.g. /tmp/open-ems-deploy.env/tmp/open-ems-deploy.env). Target /tmp + find covers all cases.
      - name: copy .env to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          port: 22
          key: ${{ secrets.PRIVATE_KEY }}
          source: /tmp/open-ems-deploy.env
          target: /tmp
          timeout: 60s
          command_timeout: 5m
      - name: docker compose up on server
        uses: fifsky/ssh-action@master
        with:
          command: |
            set -e
            # appleboy/scp-action often nests uploads (e.g. /tmp/tmp/open-ems-deploy.env when target is /tmp).
            ENV_SRC=$(find /tmp -maxdepth 12 -type f -name 'open-ems-deploy.env' 2>/dev/null | head -1 || true)
            if [ -z "$ENV_SRC" ] || [ ! -f "$ENV_SRC" ]; then
              echo "ERROR: open-ems-deploy.env not found after scp" >&2
              ls -la /tmp || true
              find /tmp -maxdepth 12 -type f -name 'open-ems-deploy.env' 2>/dev/null || true
              exit 1
            fi
            echo "Using deploy env file: $ENV_SRC"
            mv -f "$ENV_SRC" /220/open-ems/.env
            rm -rf /tmp/open-ems-deploy.env 2>/dev/null || true
            cd /220/open-ems
            chmod 600 .env
            docker compose down --remove-orphans
            docker compose up -d --build
          host: ${{ secrets.DEPLOY_HOST }}
          user: root
          key: ${{ secrets.PRIVATE_KEY }}
